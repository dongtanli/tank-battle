<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>坦克大战 🎮 Battle City</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #1a1a2e;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  font-family: 'Segoe UI', Arial, sans-serif;
  overflow: hidden;
}
.game-wrapper {
  display: flex;
  gap: 20px;
  align-items: flex-start;
  padding: 20px;
  flex-wrap: wrap;
  justify-content: center;
}
canvas {
  border: 3px solid #e94560;
  border-radius: 4px;
  image-rendering: pixelated;
  box-shadow: 0 0 30px rgba(233,69,96,0.3);
}
.sidebar {
  background: #16213e;
  border: 2px solid #0f3460;
  border-radius: 8px;
  padding: 20px;
  color: #eee;
  min-width: 200px;
}
.sidebar h2 {
  color: #e94560;
  text-align: center;
  margin-bottom: 15px;
  font-size: 1.3em;
  letter-spacing: 2px;
  text-shadow: 0 0 10px rgba(233,69,96,0.5);
}
.sidebar .info-row {
  display: flex;
  justify-content: space-between;
  padding: 8px 0;
  border-bottom: 1px solid #0f3460;
  font-size: 1em;
}
.sidebar .info-row:last-child { border-bottom: none; }
.sidebar .info-row .label { color: #aaa; }
.sidebar .info-row .value { color: #fff; font-weight: bold; }
.sidebar .info-row .value.highlight { color: #ffd700; }
.controls-box {
  margin-top: 15px;
  padding: 10px;
  background: #0f3460;
  border-radius: 6px;
  font-size: 0.85em;
  line-height: 1.6;
}
.controls-box .key { background: #1a1a2e; padding: 2px 8px; border-radius: 4px; color: #ffd700; font-weight: bold; }
.controls-box .title { color: #e94560; font-weight: bold; margin-bottom: 5px; }
.overlay {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  display: flex; flex-direction: column;
  justify-content: center; align-items: center;
  background: rgba(0,0,0,0.75);
  color: #fff;
  z-index: 10;
  pointer-events: auto;
}
.overlay.hidden { display: none; pointer-events: none; }
.overlay h1 {
  font-size: 3em;
  color: #ffd700;
  text-shadow: 0 0 20px rgba(255,215,0,0.5);
  margin-bottom: 10px;
}
.overlay .subtitle { color: #aaa; margin-bottom: 25px; font-size: 1.1em; }
.overlay .btn {
  padding: 12px 40px;
  font-size: 1.2em;
  background: #e94560;
  color: #fff;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 1px;
}
.overlay .btn:hover { background: #ff6b81; transform: scale(1.05); }
.overlay .btn:active { transform: scale(0.95); }
.overlay .game-over-score { font-size: 2em; color: #ffd700; margin: 15px 0; }
.game-container { position: relative; display: inline-block; }
</style>
</head>
<body>

<div class="game-wrapper">
  <div class="game-container">
    <canvas id="gameCanvas" width="780" height="780"></canvas>
    <div class="overlay" id="startOverlay">
      <h1>🎮 坦克大战</h1>
      <div class="subtitle">经典回归 · 保卫基地</div>
      <button class="btn" id="startBtn">开始游戏</button>
    </div>
    <div class="overlay hidden" id="gameOverOverlay">
      <h1>💥 游戏结束</h1>
      <div class="game-over-score" id="finalScore">0</div>
      <div class="subtitle" id="resultMsg">基地被摧毁</div>
      <button class="btn" id="restartBtn">重新开始</button>
    </div>
    <div class="overlay hidden" id="winOverlay">
      <h1>🎉 胜利！</h1>
      <div class="game-over-score" id="winScore">0</div>
      <div class="subtitle">恭喜你消灭了所有敌人！</div>
      <button class="btn" id="nextLevelBtn">下一关</button>
    </div>
  </div>

  <div class="sidebar">
    <h2>⚔️ 战况</h2>
    <div class="info-row"><span class="label">关卡</span><span class="value highlight" id="levelDisplay">1</span></div>
    <div class="info-row"><span class="label">得分</span><span class="value highlight" id="scoreDisplay">0</span></div>
    <div class="info-row"><span class="label">消灭</span><span class="value" id="killsDisplay">0</span></div>
    <div class="info-row"><span class="label">生命</span><span class="value" id="livesDisplay">❤️❤️❤️</span></div>
    <div class="info-row"><span class="label">剩余敌人</span><span class="value" id="enemiesDisplay">0</span></div>
    <div class="controls-box">
      <div class="title">🎮 操作</div>
      <span class="key">↑</span><span class="key">↓</span><span class="key">←</span><span class="key">→</span> 移动<br>
      <span class="key">空格</span> 射击<br>
      <span class="key">P</span> 暂停
    </div>
  </div>
</div>

<script>
// ======================== 游戏核心 ========================
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const TILE = 26;
const COLS = 30;
const ROWS = 30;

const T = { EMPTY:0, BRICK:1, STEEL:2, WATER:3, GRASS:4, BASE:5 };

// ======================== 关卡数据 ========================
const LEVELS = [
  {
    name: '第一关 · 草原',
    map: [
      "111111111111111111111111111111",
      "100000000000000000000000000001",
      "101110001110000001110001110001",
      "101110001110000001110001110001",
      "100000000000000000000000000001",
      "100000000000000000000000000001",
      "101110001110001110001110001101",
      "101110001110001110001110001101",
      "100000000000000000000000000001",
      "111100011111000001111100011111",
      "000000000000000000000000000000",
      "000000000000000000000000000000",
      "000011100000000000000111000000",
      "000011100000000000000111000000",
      "000000000000000000000000000000",
      "000000000000000000000000000000",
      "000011100000000000000111000000",
      "000011100000000000000111000000",
      "000000000000000000000000000000",
      "000000000000000000000000000000",
      "111100011111000001111100011111",
      "100000000000000000000000000001",
      "100000000000000000000000000001",
      "101110001110001110001110001101",
      "101110001110001110001110001101",
      "100000000000000000000000000001",
      "100000000000000000000000000001",
      "100001110000111100001110000101",
      "100001110000111100001110000101",
      "111111111111111111111111111111",
    ],
    enemies: 10,
    spawnRate: 3000,
  },
  {
    name: '第二关 · 钢铁',
    map: [
      "111111111111111111111111111111",
      "100000001111000000001111000001",
      "100000001111000000001111000001",
      "100111000000000011100000000001",
      "100111000000000011100000000001",
      "100000001111001111001111000001",
      "100000001111001111001111000001",
      "100111000000000000001111000001",
      "100111000000000000000000000001",
      "100000001111001111000000000001",
      "100000000000001111000000000001",
      "100000000000000000011100000001",
      "100000000000000000011100000001",
      "100011111000000000000000000001",
      "100011111000000000000000000001",
      "100000000000000000000111100001",
      "100000000000000000000111100001",
      "100000000000111000000000000001",
      "100000000000111000000000000001",
      "100011110000000000000000000001",
      "100011110000000000000000000001",
      "100000000000000011100000000001",
      "100000000000000011100000000001",
      "100001111000000000000000000001",
      "100001111000000000000000000001",
      "100000001111000000001111000001",
      "100000001111000000001111000001",
      "100001110000111100001110000101",
      "100001110000111100001110000101",
      "111111111111111111111111111111",
    ],
    enemies: 14,
    spawnRate: 2600,
  },
  {
    name: '第三关 · 水域',
    map: [
      "111111111111111111111111111111",
      "100000000000000000000000000001",
      "100000000000000000000000000001",
      "101111111110000001111111110001",
      "101111111110000001111111110001",
      "100000000000000000000000000001",
      "100000000000000000000000000001",
      "101110001111001111000111011101",
      "101110001111001111000111011101",
      "100000000000000000000000000001",
      "100000000000000000000000000001",
      "100000000000000000000000000001",
      "100000000000333300000000000001",
      "100000000000333300000000000001",
      "100000000000000000000000000001",
      "100000000000000000000000000001",
      "100000000000333300000000000001",
      "100000000000333300000000000001",
      "100000000000000000000000000001",
      "100000000000000000000000000001",
      "100000000000000000000000000001",
      "100000000000000000000000000001",
      "100011111000000000000000000001",
      "100011111000000000000000000001",
      "100000000000000000000000000001",
      "100000000000000000000000000001",
      "100000000000000000000000000001",
      "100001110000111100001110000101",
      "100001110000111100001110000101",
      "111111111111111111111111111111",
    ],
    enemies: 18,
    spawnRate: 2200,
  },
];

// ======================== 颜色 ========================
const COLORS = {
  player: '#4a9eff',
  playerDark: '#2a6fc9',
  enemy: '#e94560',
  enemyDark: '#b3304a',
  brick: '#c97b2a',
  brickDark: '#8a4f15',
  steel: '#b0b0b0',
  steelDark: '#808080',
  water: '#1a6fa0',
  waterLight: '#4090c8',
  grass: '#2a7a2a',
  grassLight: '#3a9a3a',
  base: '#ffd700',
  bullet: '#ffe0a0',
};

// ======================== 游戏状态 ========================
let game = {
  running: false, paused: false, level: 0, score: 0, kills: 0, lives: 3,
  enemiesLeft: 0, enemiesSpawned: 0, spawnTimer: 0, spawnRate: 3000,
  map: null, grid: null,
  player: null, enemies: [], bullets: [], explosions: [], particles: [],
  base: null, baseAlive: true, keys: {}, levelClear: false,
  lastTime: 0, spawnPoints: [],
};

function rand(min, max) { return Math.random() * (max - min) + min; }
function randInt(min, max) { return Math.floor(rand(min, max + 1)); }

// ======================== 坦克 ========================
class Tank {
  constructor(x, y, type) {
    this.x = x; this.y = y;
    this.type = type;
    this.size = 24;
    this.speed = type === 'player' ? 130 : 60 + randInt(0, 30);
    this.dir = type === 'player' ? 0 : randInt(0, 3);
    this.shootCooldown = 0;
    this.shootInterval = type === 'player' ? 350 : 1200 + randInt(0, 600);
    this.moveTimer = 0;
    this.changeDirTimer = type === 'player' ? 0 : rand(800, 2000);
    this.alive = true;
    this.spawnFlash = 0;
  }

  get cx() { return this.x + this.size / 2; }
  get cy() { return this.y + this.size / 2; }

  canMove(dir, map, obstacles) {
    const s = this.size;
    const speed = 2;
    let dx = 0, dy = 0;
    switch(dir) {
      case 0: dy = -speed; break;
      case 1: dx = speed; break;
      case 2: dy = speed; break;
      case 3: dx = -speed; break;
    }
    const nx = this.x + dx, ny = this.y + dy;
    if (nx < 0 || ny < 0 || nx + s > canvas.width || ny + s > canvas.height) return false;

    const margin = 1;
    const checkX = nx + margin, checkY = ny + margin;
    const checkW = s - margin * 2, checkH = s - margin * 2;
    const corners = [
      {x: checkX, y: checkY},
      {x: checkX + checkW, y: checkY},
      {x: checkX, y: checkY + checkH},
      {x: checkX + checkW, y: checkY + checkH},
    ];
    for (const c of corners) {
      const col = Math.floor(c.x / TILE);
      const row = Math.floor(c.y / TILE);
      if (col < 0 || col >= COLS || row < 0 || row >= ROWS) return false;
      if (!map || !map[row]) return false;
      const tile = map[row][col];
      if (tile === T.BRICK || tile === T.STEEL || tile === T.WATER || tile === T.BASE) return false;
    }

    for (const t of obstacles) {
      if (t === this || !t || !t.alive) continue;
      if (nx < t.x + t.size && nx + s > t.x &&
          ny < t.y + t.size && ny + s > t.y) return false;
    }
    return true;
  }

  shoot(bullets) {
    if (this.shootCooldown > 0) return;
    this.shootCooldown = this.shootInterval;
    let bx = this.cx - 2, by = this.cy - 2;
    const offset = 4;
    switch(this.dir) {
      case 0: bx = this.cx - 2; by = this.y - offset; break;
      case 1: bx = this.x + this.size; by = this.cy - 2; break;
      case 2: bx = this.cx - 2; by = this.y + this.size; break;
      case 3: bx = this.x - offset; by = this.cy - 2; break;
    }
    bullets.push({
      x: bx, y: by, w: 4, h: 4,
      dir: this.dir, speed: this.type === 'player' ? 240 : 160,
      owner: this.type, alive: true,
    });
  }

  update(dt, map, obstacles, bullets) {
    if (!this.alive) return;
    this.shootCooldown = Math.max(0, this.shootCooldown - dt * 1000);

    if (this.type === 'enemy') {
      this.moveTimer += dt * 1000;
      this.changeDirTimer -= dt * 1000;

      if (this.changeDirTimer <= 0) {
        // 有一定概率朝玩家方向移动
        if (game.player && game.player.alive && Math.random() < 0.35) {
          const dx = game.player.x - this.x;
          const dy = game.player.y - this.y;
          if (Math.abs(dx) > Math.abs(dy)) {
            this.dir = dx > 0 ? 1 : 3;
          } else {
            this.dir = dy > 0 ? 2 : 0;
          }
        } else {
          this.dir = randInt(0, 3);
        }
        this.changeDirTimer = rand(400, 1500);
      }

      if (this.moveTimer >= 50) {
        this.moveTimer = 0;
        if (this.canMove(this.dir, map, obstacles)) {
          switch(this.dir) {
            case 0: this.y -= 2; break;
            case 1: this.x += 2; break;
            case 2: this.y += 2; break;
            case 3: this.x -= 2; break;
          }
        } else {
          this.dir = randInt(0, 3);
        }
      }

      if (Math.random() < 0.015) {
        this.shoot(bullets);
      }
    }
  }

  draw(ctx) {
    if (!this.alive) return;
    const s = this.size;
    const cx = this.x + s/2, cy = this.y + s/2;
    const color = this.type === 'player' ? COLORS.player : COLORS.enemy;
    const dark = this.type === 'player' ? COLORS.playerDark : COLORS.enemyDark;

    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(this.dir * Math.PI / 2);

    // 阴影
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.fillRect(-s/2 + 2, -s/2 + 2, s, s);

    // 履带
    ctx.fillStyle = '#555';
    ctx.fillRect(-s/2, -s/2, 5, s);
    ctx.fillRect(s/2 - 5, -s/2, 5, s);

    // 履带纹理
    ctx.fillStyle = '#444';
    for (let i = 0; i < 4; i++) {
      const ty = -s/2 + 3 + i * 6;
      ctx.fillRect(-s/2 + 1, ty, 3, 3);
      ctx.fillRect(s/2 - 4, ty, 3, 3);
    }

    // 车身
    ctx.fillStyle = dark;
    ctx.fillRect(-10, -10, 20, 20);

    // 车身装甲条纹
    ctx.fillStyle = color;
    ctx.fillRect(-10, -10, 20, 3);
    ctx.fillRect(-10, 7, 20, 3);

    // 炮塔
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.arc(0, 0, 8, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = dark;
    ctx.beginPath();
    ctx.arc(0, 0, 5, 0, Math.PI * 2);
    ctx.fill();

    // 炮管
    ctx.fillStyle = '#666';
    ctx.fillRect(-2.5, -14, 5, 10);
    ctx.fillStyle = '#888';
    ctx.fillRect(-1.5, -15, 3, 3);

    ctx.restore();
  }
}

// ======================== 地图 ========================
function generateMap(levelData) {
  const map = [];
  for (let r = 0; r < ROWS; r++) {
    map[r] = [];
    for (let c = 0; c < COLS; c++) {
      let tile = T.EMPTY;
      const ch = levelData.map[r][c];
      switch(ch) {
        case '1': tile = T.BRICK; break;
        case '2': tile = T.STEEL; break;
        case '3': tile = T.WATER; break;
        case '4': tile = T.GRASS; break;
      }
      map[r][c] = tile;
    }
  }
  return map;
}

function setBase(map) {
  const bx = 14, by = 28;
  map[by][bx] = T.BASE;
  map[by][bx+1] = T.BASE;
  map[by+1][bx] = T.BASE;
  map[by+1][bx+1] = T.BASE;
}

// ======================== 初始化 ========================
function initLevel(levelNum) {
  const lvl = LEVELS[levelNum % LEVELS.length];
  const map = generateMap(lvl);
  setBase(map);

  game.level = levelNum;
  game.map = lvl;
  game.grid = map;
  game.enemiesLeft = lvl.enemies;
  game.enemiesSpawned = 0;
  game.spawnRate = lvl.spawnRate;
  game.spawnTimer = 1500;
  game.enemies = [];
  game.bullets = [];
  game.explosions = [];
  game.particles = [];
  game.baseAlive = true;
  game.levelClear = false;
  game.paused = false;
  game.running = true;

  game.base = { x: 14 * TILE, y: 28 * TILE, size: TILE * 2, alive: true };

  // 玩家出生在左下区域（确保不在墙上）
  game.player = new Tank(4 * TILE, 25 * TILE, 'player');

  game.spawnPoints = [
    {x: 1 * TILE, y: 1 * TILE},
    {x: 14 * TILE, y: 1 * TILE},
    {x: 27 * TILE - 2, y: 1 * TILE},
  ];

  updateUI();
  hideAllOverlays();
}

function spawnEnemy() {
  if (game.enemiesLeft <= 0 || game.enemiesSpawned >= game.map.enemies) return false;

  // 随机选出生点
  const candidates = game.spawnPoints.filter(sp => {
    for (const e of game.enemies) {
      if (!e.alive) continue;
      if (Math.abs(e.x - sp.x) < TILE * 2 && Math.abs(e.y - sp.y) < TILE * 2) return false;
    }
    if (game.player && game.player.alive &&
        Math.abs(game.player.x - sp.x) < TILE * 2 && Math.abs(game.player.y - sp.y) < TILE * 2) return false;
    return true;
  });

  if (candidates.length === 0) return false;
  const sp = candidates[randInt(0, candidates.length - 1)];

  const enemy = new Tank(sp.x, sp.y, 'enemy');
  enemy.spawnFlash = 300;
  game.enemies.push(enemy);
  game.enemiesSpawned++;
  return true;
}

// ======================== 碰撞工具 ========================
function rectCollide(x1, y1, w1, h1, x2, y2, w2, h2) {
  return x1 < x2 + w2 && x1 + w1 > x2 && y1 < y2 + h2 && y1 + h1 > y2;
}

// ======================== 特效 ========================
function addExplosion(x, y, size) {
  game.explosions.push({x, y, size, timer: 0, duration: 350});
  for (let i = 0; i < 20; i++) {
    const angle = rand(0, Math.PI * 2);
    const speed = rand(40, 160);
    game.particles.push({
      x, y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
      life: rand(200, 500), maxLife: 500, radius: rand(2, 5),
      color: ['#ff6b35','#ffd700','#fff','#ff4444'][randInt(0,3)],
    });
  }
}

function addSmallExplosion(x, y) {
  for (let i = 0; i < 6; i++) {
    game.particles.push({
      x, y, vx: rand(-60, 60), vy: rand(-60, 60),
      life: rand(100, 250), maxLife: 250, radius: rand(1, 3),
      color: '#ffa500',
    });
  }
}

// ======================== 子弹 ========================
function updateBullets(dt) {
  for (const b of game.bullets) {
    if (!b.alive) continue;
    const step = b.speed * dt;
    switch(b.dir) {
      case 0: b.y -= step; break;
      case 1: b.x += step; break;
      case 2: b.y += step; break;
      case 3: b.x -= step; break;
    }

    if (b.x < -10 || b.x > canvas.width + 10 || b.y < -10 || b.y > canvas.height + 10) {
      b.alive = false;
      continue;
    }

    const col = Math.floor((b.x + 2) / TILE);
    const row = Math.floor((b.y + 2) / TILE);
    if (col >= 0 && col < COLS && row >= 0 && row < ROWS && game.grid && game.grid[row]) {
      const tile = game.grid[row][col];
      if (tile === T.BRICK) {
        b.alive = false;
        game.grid[row][col] = T.EMPTY;
        addSmallExplosion(col * TILE + TILE/2, row * TILE + TILE/2);
        continue;
      }
      if (tile === T.STEEL) {
        b.alive = false;
        addSmallExplosion(col * TILE + TILE/2, row * TILE + TILE/2);
        continue;
      }
      if (tile === T.BASE) {
        b.alive = false;
        game.baseAlive = false;
        if (game.base) game.base.alive = false;
        for (let dr = 0; dr < 2; dr++)
          for (let dc = 0; dc < 2; dc++)
            if (game.grid[row+dr] && game.grid[row+dr][col+dc] !== undefined)
              game.grid[row+dr][col+dc] = T.EMPTY;
        addExplosion(game.base ? game.base.x + game.base.size/2 : 14*TILE+TILE,
                     game.base ? game.base.y + game.base.size/2 : 28*TILE+TILE, 60);
        setTimeout(() => {
          if (game.running) { game.running = false; showGameOver('💀 基地被摧毁！'); }
        }, 500);
        continue;
      }
    }

    // 子弹 vs 坦克
    if (b.owner === 'player') {
      for (const e of game.enemies) {
        if (!e.alive) continue;
        if (rectCollide(b.x, b.y, b.w, b.h, e.x, e.y, e.size, e.size)) {
          b.alive = false; e.alive = false;
          addExplosion(e.cx, e.cy, 40);
          game.kills++; game.score += 100;
          updateUI();
          const alive = game.enemies.filter(en => en.alive).length;
          if (alive === 0 && game.enemiesLeft <= 0 && game.enemiesSpawned >= game.map.enemies) {
            game.levelClear = true;
            setTimeout(() => { if (game.running) showWin(); }, 800);
          }
          break;
        }
      }
    } else {
      if (game.player && game.player.alive &&
          rectCollide(b.x, b.y, b.w, b.h, game.player.x, game.player.y, game.player.size, game.player.size)) {
        b.alive = false;
        addExplosion(game.player.cx, game.player.cy, 40);
        game.lives--; game.player.alive = false;
        updateUI();
        if (game.lives <= 0) {
          setTimeout(() => { if (game.running) { game.running = false; showGameOver('💀 生命耗尽！'); } }, 500);
        } else {
          setTimeout(() => {
            game.player.x = 4 * TILE; game.player.y = 25 * TILE;
            game.player.alive = true; game.player.dir = 0;
          }, 1000);
        }
      }
    }
  }
  game.bullets = game.bullets.filter(b => b.alive);
}

// ======================== 更新 ========================
function update(dt) {
  if (game.paused || !game.running || !game.grid) return;

  // 生成敌人
  if (game.enemiesSpawned < game.map.enemies && game.enemiesLeft > 0) {
    game.spawnTimer -= dt * 1000;
    if (game.spawnTimer <= 0) {
      if (spawnEnemy()) {
        game.enemiesLeft--;
        game.spawnTimer = game.spawnRate;
        updateUI();
      } else {
        game.spawnTimer = 500;
      }
    }
  }

  // 玩家
  if (game.player && game.player.alive) {
    const obstacles = [game.player, ...game.enemies];
    let moved = false;
    if (game.keys['ArrowUp'] || game.keys['w']) {
      game.player.dir = 0;
      if (game.player.canMove(0, game.grid, obstacles)) { game.player.y -= 2; moved = true; }
    } else if (game.keys['ArrowDown'] || game.keys['s']) {
      game.player.dir = 2;
      if (game.player.canMove(2, game.grid, obstacles)) { game.player.y += 2; moved = true; }
    } else if (game.keys['ArrowLeft'] || game.keys['a']) {
      game.player.dir = 3;
      if (game.player.canMove(3, game.grid, obstacles)) { game.player.x -= 2; moved = true; }
    } else if (game.keys['ArrowRight'] || game.keys['d']) {
      game.player.dir = 1;
      if (game.player.canMove(1, game.grid, obstacles)) { game.player.x += 2; moved = true; }
    }

    if (game.keys[' ']) game.player.shoot(game.bullets);
    game.player.update(dt, game.grid, obstacles, game.bullets);
  }

  // 敌人
  for (const e of game.enemies) {
    const obstacles = [game.player, ...game.enemies];
    e.update(dt, game.grid, obstacles, game.bullets);
    if (e.spawnFlash > 0) e.spawnFlash -= dt * 1000;
  }

  updateBullets(dt);

  for (const e of game.explosions) e.timer += dt * 1000;
  game.explosions = game.explosions.filter(e => e.timer < e.duration);

  for (const p of game.particles) {
    p.x += p.vx * dt; p.y += p.vy * dt;
    p.life -= dt * 1000;
  }
  game.particles = game.particles.filter(p => p.life > 0);
}

// ======================== 绘制 ========================
function draw() {
  try {
    ctx.fillStyle = '#2a2a2a';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // 如果网格未初始化，画提示文字
    if (!game.grid || game.grid.length === 0) {
      ctx.fillStyle = '#555';
      ctx.font = '20px Arial';
      ctx.textAlign = 'center';
      ctx.fillText('加载中...', canvas.width/2, canvas.height/2);
      return;
    }

    // ---- 地图 ----
    for (let r = 0; r < ROWS; r++) {
      if (!game.grid[r]) continue;
      for (let c = 0; c < COLS; c++) {
        const tile = game.grid[r][c];
        const x = c * TILE, y = r * TILE;
        switch(tile) {
          case T.BRICK:
            ctx.fillStyle = COLORS.brick;
            ctx.fillRect(x, y, TILE, TILE);
            ctx.fillStyle = COLORS.brickDark;
            ctx.fillRect(x+2, y+2, 10, 10);
            ctx.fillRect(x+14, y+14, 10, 10);
            ctx.fillStyle = COLORS.brick;
            ctx.fillRect(x+11, y+2, 2, 10);
            ctx.fillRect(x+2, y+11, 10, 2);
            break;
          case T.STEEL:
            ctx.fillStyle = COLORS.steel;
            ctx.fillRect(x, y, TILE, TILE);
            ctx.fillStyle = COLORS.steelDark;
            ctx.fillRect(x+3, y+3, TILE-6, TILE-6);
            ctx.fillStyle = COLORS.steel;
            ctx.fillRect(x+6, y+6, TILE-12, TILE-12);
            break;
          case T.WATER:
            ctx.fillStyle = COLORS.water;
            ctx.fillRect(x, y, TILE, TILE);
            ctx.fillStyle = COLORS.waterLight;
            ctx.fillRect(x+3, y+3, 9, 4);
            ctx.fillRect(x+14, y+16, 9, 4);
            ctx.fillStyle = 'rgba(255,255,255,0.15)';
            ctx.fillRect(x+8, y+10, 6, 8);
            break;
        }
      }
    }

    // ---- 基地 ----
    if (game.base && game.base.alive) {
      for (let r = 28; r < 30; r++) {
        for (let c = 14; c < 16; c++) {
          const x = c * TILE, y = r * TILE;
          ctx.fillStyle = '#444';
          ctx.fillRect(x, y, TILE, TILE);
          ctx.fillStyle = '#333';
          ctx.fillRect(x+2, y+2, TILE-4, TILE-4);
          // 鹰旗
          ctx.fillStyle = COLORS.base;
          ctx.font = 'bold 18px Arial';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText('⚜️', x + TILE/2, y + TILE/2);
        }
      }
    }

    // ---- 敌人 ----
    for (const e of game.enemies) {
      if (e.spawnFlash > 0 && Math.floor(e.spawnFlash / 50) % 2 === 0) {
        // 闪烁效果
        ctx.save();
        ctx.globalAlpha = 0.5;
        e.draw(ctx);
        ctx.restore();
        continue;
      }
      e.draw(ctx);
    }

    // ---- 玩家 ----
    if (game.player) game.player.draw(ctx);

    // ---- 子弹 ----
    for (const b of game.bullets) {
      if (!b.alive) continue;
      ctx.fillStyle = COLORS.bullet;
      ctx.shadowBlur = 12;
      ctx.shadowColor = '#fff';
      ctx.fillRect(b.x, b.y, b.w, b.h);
      ctx.shadowBlur = 0;
    }

    // ---- 爆炸 ----
    for (const e of game.explosions) {
      const progress = e.timer / e.duration;
      const radius = e.size * (0.4 + progress * 0.6);
      const alpha = 1 - progress;
      ctx.globalAlpha = alpha;
      const grad = ctx.createRadialGradient(e.x, e.y, 0, e.x, e.y, radius);
      grad.addColorStop(0, '#fff');
      grad.addColorStop(0.25, '#ffd700');
      grad.addColorStop(0.5, '#ff6b35');
      grad.addColorStop(1, 'transparent');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(e.x, e.y, radius, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    }

    // ---- 粒子 ----
    for (const p of game.particles) {
      const alpha = p.life / p.maxLife;
      ctx.globalAlpha = alpha;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.radius * alpha, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;

    // ---- 草丛覆盖 ----
    if (game.grid) {
      for (let r = 0; r < ROWS; r++) {
        if (!game.grid[r]) continue;
        for (let c = 0; c < COLS; c++) {
          if (game.grid[r][c] === T.GRASS) {
            const x = c * TILE, y = r * TILE;
            ctx.fillStyle = 'rgba(42,130,42,0.55)';
            ctx.fillRect(x, y, TILE, TILE);
            ctx.fillStyle = 'rgba(58,170,58,0.45)';
            for (let i = 0; i < 4; i++) {
              const gx = x + 4 + ((i * 7) % 16);
              const gy = y + 4 + ((i * 11) % 16);
              ctx.fillRect(gx, gy, 4, 7);
            }
          }
        }
      }
    }

    // ---- 暂停 ----
    if (game.paused) {
      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 48px Arial';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('⏸ 暂停', canvas.width/2, canvas.height/2);
    }
  } catch(e) {
    console.error('Draw error:', e);
  }
}

// ======================== UI ========================
function updateUI() {
  try {
    document.getElementById('levelDisplay').textContent = game.level + 1;
    document.getElementById('scoreDisplay').textContent = game.score;
    document.getElementById('killsDisplay').textContent = game.kills;
    document.getElementById('enemiesDisplay').textContent = game.enemiesLeft;
    let hearts = '';
    for (let i = 0; i < Math.min(Math.max(game.lives, 0), 5); i++) hearts += '❤️';
    document.getElementById('livesDisplay').textContent = hearts || '💀';
  } catch(e) {}
}

function hideAllOverlays() {
  document.getElementById('startOverlay').classList.add('hidden');
  document.getElementById('gameOverOverlay').classList.add('hidden');
  document.getElementById('winOverlay').classList.add('hidden');
}

function showGameOver(msg) {
  document.getElementById('finalScore').textContent = '得分: ' + game.score;
  document.getElementById('resultMsg').textContent = msg;
  document.getElementById('gameOverOverlay').classList.remove('hidden');
}

function showWin() {
  document.getElementById('winScore').textContent = '得分: ' + game.score;
  document.getElementById('winOverlay').classList.remove('hidden');
}

// ======================== 游戏循环 ========================
function gameLoop(timestamp) {
  const dt = Math.min((timestamp - game.lastTime) / 1000, 0.05);
  game.lastTime = timestamp;

  if (game.running) update(dt);
  draw();

  requestAnimationFrame(gameLoop);
}

// ======================== 输入 ========================
document.addEventListener('keydown', (e) => {
  game.keys[e.key] = true;
  if (e.key === 'p' || e.key === 'P') game.paused = !game.paused;
  if (e.key === ' ' || e.key === 'ArrowUp' || e.key === 'ArrowDown' ||
      e.key === 'ArrowLeft' || e.key === 'ArrowRight') e.preventDefault();
});

document.addEventListener('keyup', (e) => {
  game.keys[e.key] = false;
});

// ======================== 按钮 ========================
document.getElementById('startBtn').addEventListener('click', () => { initLevel(0); });
document.getElementById('restartBtn').addEventListener('click', () => {
  game.lives = 3; game.score = 0; game.kills = 0;
  initLevel(0);
});
document.getElementById('nextLevelBtn').addEventListener('click', () => {
  initLevel(game.level + 1);
});

// ======================== 启动 ========================
game.lastTime = performance.now();
requestAnimationFrame(gameLoop);
updateUI();
</script>
