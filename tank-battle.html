<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>坦克大战 🎮</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #1a1a2e;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  font-family: 'Segoe UI', Arial, sans-serif;
  overflow: hidden;
}
.game-wrapper {
  display: flex;
  gap: 20px;
  align-items: flex-start;
  padding: 20px;
}
canvas {
  border: 3px solid #e94560;
  border-radius: 4px;
  image-rendering: pixelated;
  box-shadow: 0 0 30px rgba(233,69,96,0.3);
}
.sidebar {
  background: #16213e;
  border: 2px solid #0f3460;
  border-radius: 8px;
  padding: 20px;
  color: #eee;
  min-width: 200px;
}
.sidebar h2 {
  color: #e94560;
  text-align: center;
  margin-bottom: 15px;
  font-size: 1.3em;
  letter-spacing: 2px;
  text-shadow: 0 0 10px rgba(233,69,96,0.5);
}
.sidebar .info-row {
  display: flex;
  justify-content: space-between;
  padding: 8px 0;
  border-bottom: 1px solid #0f3460;
  font-size: 1em;
}
.sidebar .info-row:last-child { border-bottom: none; }
.sidebar .info-row .label { color: #aaa; }
.sidebar .info-row .value { color: #fff; font-weight: bold; }
.sidebar .info-row .value.highlight { color: #ffd700; }
.controls-box {
  margin-top: 15px;
  padding: 10px;
  background: #0f3460;
  border-radius: 6px;
  font-size: 0.85em;
  line-height: 1.6;
}
.controls-box .key { background: #1a1a2e; padding: 2px 8px; border-radius: 4px; color: #ffd700; font-weight: bold; }
.controls-box .title { color: #e94560; font-weight: bold; margin-bottom: 5px; }
.overlay {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  display: flex; flex-direction: column;
  justify-content: center; align-items: center;
  background: rgba(0,0,0,0.75);
  color: #fff;
  z-index: 10;
  pointer-events: auto;
}
.overlay.hidden { display: none; pointer-events: none; }
.overlay h1 {
  font-size: 3em;
  color: #ffd700;
  text-shadow: 0 0 20px rgba(255,215,0,0.5);
  margin-bottom: 10px;
}
.overlay .subtitle { color: #aaa; margin-bottom: 25px; font-size: 1.1em; }
.overlay .btn {
  padding: 12px 40px;
  font-size: 1.2em;
  background: #e94560;
  color: #fff;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 1px;
}
.overlay .btn:hover { background: #ff6b81; transform: scale(1.05); }
.overlay .btn:active { transform: scale(0.95); }
.overlay .game-over-score { font-size: 2em; color: #ffd700; margin: 15px 0; }
.game-container { position: relative; }
</style>
</head>
<body>

<div class="game-wrapper">
  <div class="game-container">
    <canvas id="gameCanvas" width="780" height="780"></canvas>
    <div class="overlay" id="startOverlay">
      <h1>🎮 坦克大战</h1>
      <div class="subtitle">经典回归 · 保卫基地</div>
      <button class="btn" id="startBtn">开始游戏</button>
    </div>
    <div class="overlay hidden" id="gameOverOverlay">
      <h1>💥 游戏结束</h1>
      <div class="game-over-score" id="finalScore">0</div>
      <div class="subtitle" id="resultMsg">基地被摧毁</div>
      <button class="btn" id="restartBtn">重新开始</button>
    </div>
    <div class="overlay hidden" id="winOverlay">
      <h1>🎉 胜利！</h1>
      <div class="game-over-score" id="winScore">0</div>
      <div class="subtitle">恭喜你消灭了所有敌人！</div>
      <button class="btn" id="nextLevelBtn">下一关</button>
    </div>
  </div>

  <div class="sidebar">
    <h2>⚔️ 战况</h2>
    <div class="info-row"><span class="label">关卡</span><span class="value highlight" id="levelDisplay">1</span></div>
    <div class="info-row"><span class="label">得分</span><span class="value highlight" id="scoreDisplay">0</span></div>
    <div class="info-row"><span class="label">消灭</span><span class="value" id="killsDisplay">0</span></div>
    <div class="info-row"><span class="label">生命</span><span class="value" id="livesDisplay">❤️❤️❤️</span></div>
    <div class="info-row"><span class="label">剩余敌人</span><span class="value" id="enemiesDisplay">0</span></div>
    <div class="controls-box">
      <div class="title">🎮 操作</div>
      <span class="key">↑</span><span class="key">↓</span><span class="key">←</span><span class="key">→</span> 移动<br>
      <span class="key">空格</span> 射击<br>
      <span class="key">P</span> 暂停
    </div>
  </div>
</div>

<script>
// ======================== 游戏核心 ========================
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const TILE = 26;        // 每格像素
const COLS = 30;        // 列数 780/26
const ROWS = 30;        // 行数

// 地图元素
const T = { EMPTY:0, BRICK:1, STEEL:2, WATER:3, GRASS:4, BASE:5 };

// ======================== 关卡数据 ========================
const LEVELS = [
  // 第1关
  {
    map: [
      "111111111111111111111111111111",
      "100000000000000000000000000001",
      "101110001110000001110001110001",
      "101110001110000001110001110001",
      "100000000000000000000000000001",
      "100000000000000000000000000001",
      "101110001110001110001110001101",
      "101110001110001110001110001101",
      "100000000000000000000000000001",
      "111100011111000001111100011111",
      "000000000000000000000000000000",
      "000000000000000000000000000000",
      "000011100000000000000111000000",
      "000011100000000000000111000000",
      "000000000000000000000000000000",
      "000000000000000000000000000000",
      "000011100000000000000111000000",
      "000011100000000000000111000000",
      "000000000000000000000000000000",
      "000000000000000000000000000000",
      "111100011111000001111100011111",
      "100000000000000000000000000001",
      "100000000000000000000000000001",
      "101110001110001110001110001101",
      "101110001110001110001110001101",
      "100000000000000000000000000001",
      "100000000000000000000000000001",
      "100001110000111100001110000101",
      "100001110000111100001110000101",
      "111111111111111111111111111111",
    ],
    enemies: 12,
    spawnRate: 3000,
  },
  // 第2关
  {
    map: [
      "111111111111111111111111111111",
      "100000001111000000001111000001",
      "100000001111000000001111000001",
      "100111000000000011100000000001",
      "100111000000000011100000000001",
      "100000001111001111001111000001",
      "100000001111001111001111000001",
      "100111000000000000001111000001",
      "100111000000000000000000000001",
      "100000001111001111000000000001",
      "100000000000001111000000000001",
      "100000000000000000011100000001",
      "100000000000000000011100000001",
      "100011111000000000000000000001",
      "100011111000000000000000000001",
      "100000000000000000000111100001",
      "100000000000000000000111100001",
      "100000000000111000000000000001",
      "100000000000111000000000000001",
      "100011110000000000000000000001",
      "100011110000000000000000000001",
      "100000000000000011100000000001",
      "100000000000000011100000000001",
      "100001111000000000000000000001",
      "100001111000000000000000000001",
      "100000001111000000001111000001",
      "100000001111000000001111000001",
      "100001110000111100001110000101",
      "100001110000111100001110000101",
      "111111111111111111111111111111",
    ],
    enemies: 15,
    spawnRate: 2800,
  },
  // 第3关
  {
    map: [
      "111111111111111111111111111111",
      "100000000000000000000000000001",
      "100000000000000000000000000001",
      "101111111110000001111111110001",
      "101111111110000001111111110001",
      "100000000000000000000000000001",
      "100000000000000000000000000001",
      "101110001111001111000111011101",
      "101110001111001111000111011101",
      "100000000000000000000000000001",
      "100000000000000000000000000001",
      "100000000000000000000000000001",
      "100000000000333300000000000001",
      "100000000000333300000000000001",
      "100000000000000000000000000001",
      "100000000000000000000000000001",
      "100000000000333300000000000001",
      "100000000000333300000000000001",
      "100000000000000000000000000001",
      "100000000000000000000000000001",
      "100000000000000000000000000001",
      "100000000000000000000000000001",
      "100011111000000000000000000001",
      "100011111000000000000000000001",
      "100000000000000000000000000001",
      "100000000000000000000000000001",
      "100000000000000000000000000001",
      "100001110000111100001110000101",
      "100001110000111100001110000101",
      "111111111111111111111111111111",
    ],
    enemies: 18,
    spawnRate: 2500,
  },
];

// ======================== 颜色 ========================
const COLORS = {
  player: '#4a9eff',
  playerDark: '#2a6fc9',
  enemy: '#e94560',
  enemyDark: '#b3304a',
  brick: '#c97b2a',
  brickDark: '#8a4f15',
  steel: '#aaa',
  steelDark: '#777',
  water: '#2a8fc9',
  waterLight: '#4ab0e8',
  grass: '#2a8a2a',
  grassLight: '#3aaa3a',
  base: '#ffd700',
  bullet: '#fff',
  trail: '#ffa500',
};

// ======================== 游戏状态 ========================
let game = {
  running: false, paused: false, level: 0, score: 0, kills: 0, lives: 3,
  enemiesLeft: 0, enemiesSpawned: 0, spawnTimer: 0, spawnRate: 3000,
  map: [], grid: [],
  player: null, enemies: [], bullets: [], explosions: [], particles: [],
  base: null, baseAlive: true, keys: {}, levelClear: false,
  lastTime: 0, dt: 0,
};

// ======================== 工具函数 ========================
function rand(min, max) { return Math.random() * (max - min) + min; }
function randInt(min, max) { return Math.floor(rand(min, max + 1)); }

// ======================== 游戏对象 ========================
class Tank {
  constructor(x, y, type) {
    this.x = x; this.y = y;
    this.type = type; // 'player' or 'enemy'
    this.size = TILE - 2;
    this.speed = type === 'player' ? 120 : 60;
    this.dir = type === 'player' ? 0 : randInt(0,3); // 0上 1右 2下 3左
    this.hp = type === 'player' ? 1 : 1;
    this.shootCooldown = 0;
    this.shootInterval = type === 'player' ? 400 : 1500;
    this.moving = false;
    this.moveTimer = 0;
    this.changeDirTimer = rand(1000, 3000);
    this.alive = true;
    this.cornerX = 0; this.cornerY = 0;
  }

  get cx() { return this.x + this.size / 2; }
  get cy() { return this.y + this.size / 2; }

  getCorners(dir) {
    const s = this.size;
    let dx = 0, dy = 0;
    switch(dir) {
      case 0: dy = -2; dx = 0; break;
      case 1: dx = 2; dy = 0; break;
      case 2: dy = 2; dx = 0; break;
      case 3: dx = -2; dy = 0; break;
    }
    const nx = this.x + dx, ny = this.y + dy;
    return [
      {x:nx, y:ny}, {x:nx+s, y:ny},
      {x:nx, y:ny+s}, {x:nx+s, y:ny+s},
    ];
  }

  getBounds(dir) {
    const d = dir !== undefined ? dir : this.dir;
    const s = this.size;
    switch(d) {
      case 0: return {x:this.x, y:this.y - 2, w:s, h:2 + s + 2};
      case 1: return {x:this.x - 2, y:this.y, w:2 + s + 2, h:s};
      case 2: return {x:this.x, y:this.y - 2, w:s, h:2 + s + 2};
      case 3: return {x:this.x - 2, y:this.y, w:2 + s + 2, h:s};
    }
  }

  canMove(dir, map, obstacles) {
    const s = this.size;
    let dx = 0, dy = 0;
    switch(dir) {
      case 0: dy = -2; break;
      case 1: dx = 2; break;
      case 2: dy = 2; break;
      case 3: dx = -2; break;
    }
    const nx = this.x + dx, ny = this.y + dy;
    if (nx < 0 || ny < 0 || nx + s > canvas.width || ny + s > canvas.height) return false;

    // 碰撞检测
    const corners = this.getCorners(dir);
    for (const c of corners) {
      const col = Math.floor(c.x / TILE);
      const row = Math.floor(c.y / TILE);
      if (col < 0 || col >= COLS || row < 0 || row >= ROWS) return false;
      const tile = map[row][col];
      if (tile === T.BRICK || tile === T.STEEL || tile === T.WATER) return false;
    }

    // 与其他坦克碰撞
    for (const t of obstacles) {
      if (t === this || !t.alive) continue;
      if (nx < t.x + t.size && nx + s > t.x &&
          ny < t.y + t.size && ny + s > t.y) return false;
    }
    return true;
  }

  shoot(bullets) {
    if (this.shootCooldown > 0) return;
    this.shootCooldown = this.shootInterval;
    let bx = this.cx - 2, by = this.cy - 2;
    switch(this.dir) {
      case 0: bx = this.cx - 2; by = this.y - 6; break;
      case 1: bx = this.x + this.size + 2; by = this.cy - 2; break;
      case 2: bx = this.cx - 2; by = this.y + this.size + 2; break;
      case 3: bx = this.x - 6; by = this.cy - 2; break;
    }
    const bullet = {
      x: bx, y: by, w: 4, h: 4,
      dir: this.dir, speed: this.type === 'player' ? 220 : 150,
      owner: this.type, alive: true,
    };
    bullets.push(bullet);
  }

  update(dt, map, obstacles, bullets) {
    if (!this.alive) return;
    this.shootCooldown = Math.max(0, this.shootCooldown - dt);

    if (this.type === 'enemy') {
      this.moveTimer += dt;
      this.changeDirTimer -= dt;

      if (this.changeDirTimer <= 0) {
        this.dir = randInt(0, 3);
        this.changeDirTimer = rand(800, 2500);
      }

      if (this.moveTimer >= 100) {
        this.moveTimer = 0;
        if (this.canMove(this.dir, map, obstacles)) {
          switch(this.dir) {
            case 0: this.y -= 2; break;
            case 1: this.x += 2; break;
            case 2: this.y += 2; break;
            case 3: this.x -= 2; break;
          }
        } else {
          this.dir = randInt(0, 3);
        }
      }

      // 随机射击
      if (Math.random() < 0.02) {
        this.shoot(bullets);
      }
    }
  }

  draw(ctx) {
    if (!this.alive) return;
    const s = this.size;
    const cx = this.x + s/2, cy = this.y + s/2;
    const color = this.type === 'player' ? COLORS.player : COLORS.enemy;
    const dark = this.type === 'player' ? COLORS.playerDark : COLORS.enemyDark;

    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(this.dir * Math.PI / 2);

    // 坦克主体
    ctx.fillStyle = dark;
    ctx.fillRect(-s/2, -s/2, s, s);

    // 履带
    ctx.fillStyle = color;
    ctx.fillRect(-s/2, -s/2, 5, s);       // 左履带
    ctx.fillRect(s/2 - 5, -s/2, 5, s);     // 右履带
    ctx.fillRect(-s/2, -s/2, s, 5);        // 上履带
    ctx.fillRect(-s/2, s/2 - 5, s, 5);     // 下履带

    // 车身
    ctx.fillStyle = color;
    ctx.fillRect(-9, -9, 18, 18);

    // 炮塔 (圆形)
    ctx.fillStyle = dark;
    ctx.beginPath();
    ctx.arc(0, 0, 7, 0, Math.PI * 2);
    ctx.fill();

    // 炮管
    ctx.fillStyle = dark;
    ctx.fillRect(-2, -13, 4, 10);

    // 炮管尖端
    ctx.fillStyle = '#fff';
    ctx.fillRect(-1, -14, 2, 2);

    ctx.restore();
  }
}

// ======================== 地图生成 ========================
function generateMap(levelData) {
  const map = [];
  for (let r = 0; r < ROWS; r++) {
    map[r] = [];
    for (let c = 0; c < COLS; c++) {
      let tile = T.EMPTY;
      const ch = levelData.map[r][c];
      switch(ch) {
        case '1': tile = T.BRICK; break;
        case '2': tile = T.STEEL; break;
        case '3': tile = T.WATER; break;
        case '4': tile = T.GRASS; break;
        default: tile = T.EMPTY;
      }
      map[r][c] = tile;
    }
  }
  return map;
}

function setBase(map) {
  // 基地在底部中央 (14,28)
  const bx = 14, by = 28;
  map[by][bx] = T.BASE;
  map[by][bx+1] = T.BASE;
  map[by+1][bx] = T.BASE;
  map[by+1][bx+1] = T.BASE;
}

// ======================== 初始化 ========================
function initLevel(levelNum) {
  const lvl = LEVELS[levelNum % LEVELS.length];
  const map = generateMap(lvl);
  setBase(map);

  game.level = levelNum;
  game.map = lvl;
  game.grid = map;
  game.enemiesLeft = lvl.enemies;
  game.enemiesSpawned = 0;
  game.spawnRate = lvl.spawnRate;
  game.spawnTimer = 2000;
  game.enemies = [];
  game.bullets = [];
  game.explosions = [];
  game.particles = [];
  game.baseAlive = true;
  game.levelClear = false;
  game.paused = false;
  game.running = true;

  // 基地位置
  game.base = { x: 14 * TILE, y: 28 * TILE, size: TILE * 2, alive: true };

  // 玩家
  game.player = new Tank(9 * TILE, 24 * TILE, 'player');

  updateUI();
  hideAllOverlays();
}

// ======================== 生成敌人 ========================
function spawnEnemy() {
  if (game.enemiesLeft <= 0 || game.enemiesSpawned >= game.map.enemies) return false;

  const spawnPoints = [
    {x:1, y:1}, {x:14, y:1}, {x:27, y:1},
  ];
  const sp = spawnPoints[randInt(0, 2)];
  const x = sp.x * TILE, y = sp.y * TILE;

  // 检查是否有坦克在出生点
  for (const e of game.enemies) {
    if (!e.alive) continue;
    if (Math.abs(e.x - x) < TILE && Math.abs(e.y - y) < TILE) return false;
  }
  if (game.player && game.player.alive &&
      Math.abs(game.player.x - x) < TILE && Math.abs(game.player.y - y) < TILE) return false;

  const enemy = new Tank(x, y, 'enemy');
  // 随机器械速度
  if (Math.random() < 0.2) enemy.speed = 90;
  game.enemies.push(enemy);
  game.enemiesSpawned++;
  return true;
}

// ======================== 碰撞检测 ========================
function aabb(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x &&
         a.y < b.y + b.h && a.y + a.h > b.y;
}

function rectCollide(x1, y1, w1, h1, x2, y2, w2, h2) {
  return x1 < x2 + w2 && x1 + w1 > x2 && y1 < y2 + h2 && y1 + h1 > y2;
}

// ======================== 添加爆炸效果 ========================
function addExplosion(x, y, size) {
  game.explosions.push({x, y, size, timer: 0, duration: 300});
  for (let i = 0; i < 15; i++) {
    game.particles.push({
      x, y, vx: rand(-100, 100), vy: rand(-100, 100),
      life: rand(200, 500), maxLife: 500, radius: rand(2, 5),
      color: Math.random() < 0.5 ? '#ff6b35' : '#ffd700',
    });
  }
}

function addSmallExplosion(x, y) {
  for (let i = 0; i < 8; i++) {
    game.particles.push({
      x, y, vx: rand(-80, 80), vy: rand(-80, 80),
      life: rand(100, 300), maxLife: 300, radius: rand(1, 3),
      color: '#ffa500',
    });
  }
}

// ======================== 子弹更新 ========================
function updateBullets(dt) {
  for (const b of game.bullets) {
    if (!b.alive) continue;
    switch(b.dir) {
      case 0: b.y -= b.speed * dt; break;
      case 1: b.x += b.speed * dt; break;
      case 2: b.y += b.speed * dt; break;
      case 3: b.x -= b.speed * dt; break;
    }

    // 边界检测
    if (b.x < 0 || b.x > canvas.width || b.y < 0 || b.y > canvas.height) {
      b.alive = false;
      addSmallExplosion(b.x, b.y);
      continue;
    }

    // 与地图碰撞
    const col = Math.floor(b.x / TILE);
    const row = Math.floor(b.y / TILE);
    if (col >= 0 && col < COLS && row >= 0 && row < ROWS) {
      const tile = game.grid[row][col];
      if (tile === T.BRICK) {
        b.alive = false;
        game.grid[row][col] = T.EMPTY;
        addSmallExplosion(col * TILE + TILE/2, row * TILE + TILE/2);
        continue;
      }
      if (tile === T.STEEL) {
        b.alive = false;
        addSmallExplosion(col * TILE + TILE/2, row * TILE + TILE/2);
        continue;
      }
      if (tile === T.BASE) {
        b.alive = false;
        game.baseAlive = false;
        game.base.alive = false;
        game.grid[row][col] = T.EMPTY;
        game.grid[row+1][col] = T.EMPTY;
        game.grid[row][col+1] = T.EMPTY;
        game.grid[row+1][col+1] = T.EMPTY;
        addExplosion(game.base.x + game.base.size/2, game.base.y + game.base.size/2, 60);
        // 游戏结束
        setTimeout(() => {
          if (game.running) {
            game.running = false;
            showGameOver('💀 基地被摧毁！');
          }
        }, 500);
        continue;
      }
    }

    // 与坦克碰撞
    const bBounds = {x: b.x, y: b.y, w: b.w, h: b.h};
    if (b.owner === 'player') {
      for (const e of game.enemies) {
        if (!e.alive) continue;
        if (rectCollide(b.x, b.y, b.w, b.h, e.x, e.y, e.size, e.size)) {
          b.alive = false;
          e.alive = false;
          addExplosion(e.cx, e.cy, 40);
          game.kills++;
          game.score += 100;
          updateUI();

          // 检查是否全部消灭
          const alive = game.enemies.filter(en => en.alive).length;
          if (alive === 0 && game.enemiesLeft <= 0 && game.enemiesSpawned >= game.map.enemies) {
            game.levelClear = true;
            setTimeout(() => {
              if (game.running) showWin();
            }, 800);
          }
          break;
        }
      }
    } else {
      if (game.player && game.player.alive &&
          rectCollide(b.x, b.y, b.w, b.h, game.player.x, game.player.y, game.player.size, game.player.size)) {
        b.alive = false;
        addExplosion(game.player.cx, game.player.cy, 40);
        game.lives--;
        game.player.alive = false;
        updateUI();
        if (game.lives <= 0) {
          setTimeout(() => {
            if (game.running) {
              game.running = false;
              showGameOver('💀 生命耗尽！');
            }
          }, 500);
        } else {
          // 重生
          setTimeout(() => {
            game.player.x = 9 * TILE;
            game.player.y = 24 * TILE;
            game.player.alive = true;
            game.player.dir = 0;
          }, 1000);
        }
      }
    }
  }

  game.bullets = game.bullets.filter(b => b.alive);
}

// ======================== 更新 ========================
function update(dt) {
  if (game.paused || !game.running) return;

  // 生成敌人
  if (game.enemiesSpawned < game.map.enemies && game.enemiesLeft > 0) {
    game.spawnTimer -= dt;
    if (game.spawnTimer <= 0) {
      if (spawnEnemy()) {
        game.enemiesLeft--;
        game.spawnTimer = game.spawnRate;
        updateUI();
      } else {
        game.spawnTimer = 500;
      }
    }
  }

  // 玩家移动
  if (game.player && game.player.alive) {
    let moving = false;
    const obstacles = [game.player, ...game.enemies];
    if (game.keys['ArrowUp'] || game.keys['w']) {
      game.player.dir = 0;
      if (game.player.canMove(0, game.grid, obstacles)) {
        game.player.y -= 2; moving = true;
      }
    } else if (game.keys['ArrowDown'] || game.keys['s']) {
      game.player.dir = 2;
      if (game.player.canMove(2, game.grid, obstacles)) {
        game.player.y += 2; moving = true;
      }
    } else if (game.keys['ArrowLeft'] || game.keys['a']) {
      game.player.dir = 3;
      if (game.player.canMove(3, game.grid, obstacles)) {
        game.player.x -= 2; moving = true;
      }
    } else if (game.keys['ArrowRight'] || game.keys['d']) {
      game.player.dir = 1;
      if (game.player.canMove(1, game.grid, obstacles)) {
        game.player.x += 2; moving = true;
      }
    }

    // 射击
    if (game.keys[' ']) {
      game.player.shoot(game.bullets);
    }

    game.player.update(dt, game.grid, obstacles, game.bullets);
  }

  // 敌人更新
  for (const e of game.enemies) {
    const obstacles = [game.player, ...game.enemies];
    e.update(dt, game.grid, obstacles, game.bullets);
  }

  // 子弹更新
  updateBullets(dt);

  // 爆炸效果更新
  for (const e of game.explosions) {
    e.timer += dt;
  }
  game.explosions = game.explosions.filter(e => e.timer < e.duration);

  // 粒子更新
  for (const p of game.particles) {
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.life -= dt;
  }
  game.particles = game.particles.filter(p => p.life > 0);
}

// ======================== 绘制 ========================
function draw() {
  ctx.fillStyle = '#2a2a2a';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // 绘制地图
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const tile = game.grid[r][c];
      const x = c * TILE, y = r * TILE;
      switch(tile) {
        case T.BRICK:
          ctx.fillStyle = COLORS.brick;
          ctx.fillRect(x, y, TILE, TILE);
          ctx.fillStyle = COLORS.brickDark;
          ctx.fillRect(x+2, y+2, TILE/2-2, TILE/2-2);
          ctx.fillRect(x+TILE/2, y+TILE/2, TILE/2-2, TILE/2-2);
          ctx.fillStyle = COLORS.brick;
          ctx.fillRect(x+TILE/2-1, y+2, 2, TILE/2-2);
          ctx.fillRect(x+2, y+TILE/2-1, TILE/2-2, 2);
          break;
        case T.STEEL:
          ctx.fillStyle = COLORS.steel;
          ctx.fillRect(x, y, TILE, TILE);
          ctx.fillStyle = COLORS.steelDark;
          ctx.fillRect(x+3, y+3, TILE-6, TILE-6);
          ctx.fillStyle = COLORS.steel;
          ctx.fillRect(x+5, y+5, TILE-10, TILE-10);
          break;
        case T.WATER:
          ctx.fillStyle = COLORS.water;
          ctx.fillRect(x, y, TILE, TILE);
          ctx.fillStyle = COLORS.waterLight;
          ctx.fillRect(x+2, y+2, 8, 4);
          ctx.fillRect(x+16, y+12, 8, 4);
          break;
        case T.GRASS:
          ctx.fillStyle = COLORS.grass;
          ctx.fillRect(x, y, TILE, TILE);
          ctx.fillStyle = COLORS.grassLight;
          for (let i = 0; i < 3; i++) {
            const gx = x + rand(2, TILE-6);
            const gy = y + rand(2, TILE-6);
            ctx.fillRect(gx, gy, 4, 6);
          }
          break;
      }
    }
  }

  // 绘制基地
  if (game.base && game.base.alive) {
    for (let r = 28; r < 30; r++) {
      for (let c = 14; c < 16; c++) {
        const x = c * TILE, y = r * TILE;
        ctx.fillStyle = '#333';
        ctx.fillRect(x, y, TILE, TILE);
        // 鹰旗
        ctx.fillStyle = COLORS.base;
        ctx.beginPath();
        ctx.moveTo(x+4, y+TILE-4);
        ctx.lineTo(x+TILE/2, y+4);
        ctx.lineTo(x+TILE-4, y+TILE-4);
        ctx.fill();
      }
    }
    // 基地文字
    ctx.fillStyle = '#fff';
    ctx.font = '10px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('★', 14*TILE + TILE, 29*TILE + TILE/2);
  }

  // 绘制敌人
  for (const e of game.enemies) e.draw(ctx);

  // 绘制玩家
  if (game.player) game.player.draw(ctx);

  // 绘制子弹
  for (const b of game.bullets) {
    if (!b.alive) continue;
    ctx.fillStyle = COLORS.bullet;
    ctx.shadowBlur = 10;
    ctx.shadowColor = '#fff';
    ctx.fillRect(b.x, b.y, b.w, b.h);
    ctx.shadowBlur = 0;
  }

  // 绘制爆炸效果
  for (const e of game.explosions) {
    const progress = e.timer / e.duration;
    const radius = e.size * (0.5 + progress * 0.5);
    const alpha = 1 - progress;
    ctx.globalAlpha = alpha;
    const gradient = ctx.createRadialGradient(e.x, e.y, 0, e.x, e.y, radius);
    gradient.addColorStop(0, '#fff');
    gradient.addColorStop(0.3, '#ffd700');
    gradient.addColorStop(0.6, '#ff6b35');
    gradient.addColorStop(1, 'transparent');
    ctx.fillStyle = gradient;
    ctx.beginPath();
    ctx.arc(e.x, e.y, radius, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  // 绘制粒子
  for (const p of game.particles) {
    const alpha = p.life / p.maxLife;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.radius * alpha, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // 草丛覆盖（绘制在坦克之上）
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (game.grid[r][c] === T.GRASS) {
        const x = c * TILE, y = r * TILE;
        ctx.fillStyle = 'rgba(42, 138, 42, 0.7)';
        ctx.fillRect(x, y, TILE, TILE);
        ctx.fillStyle = 'rgba(58, 170, 58, 0.5)';
        for (let i = 0; i < 5; i++) {
          const gx = x + ((i * 7 + 3) % (TILE-6)) + 2;
          const gy = y + ((i * 13 + 7) % (TILE-6)) + 2;
          ctx.fillRect(gx, gy, 4, 6);
        }
      }
    }
  }

  // 暂停提示
  if (game.paused) {
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 48px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('⏸ 暂停', canvas.width/2, canvas.height/2);
  }
}

// ======================== UI更新 ========================
function updateUI() {
  document.getElementById('levelDisplay').textContent = game.level + 1;
  document.getElementById('scoreDisplay').textContent = game.score;
  document.getElementById('killsDisplay').textContent = game.kills;
  document.getElementById('enemiesDisplay').textContent = game.enemiesLeft;
  let hearts = '';
  for (let i = 0; i < Math.min(game.lives, 5); i++) hearts += '❤️';
  document.getElementById('livesDisplay').textContent = hearts || '💀';
}

function hideAllOverlays() {
  document.getElementById('startOverlay').classList.add('hidden');
  document.getElementById('gameOverOverlay').classList.add('hidden');
  document.getElementById('winOverlay').classList.add('hidden');
}

function showGameOver(msg) {
  document.getElementById('finalScore').textContent = '得分: ' + game.score;
  document.getElementById('resultMsg').textContent = msg;
  document.getElementById('gameOverOverlay').classList.remove('hidden');
}

function showWin() {
  document.getElementById('winScore').textContent = '得分: ' + game.score;
  document.getElementById('winOverlay').classList.remove('hidden');
}

// ======================== 游戏循环 ========================
function gameLoop(timestamp) {
  const dt = Math.min((timestamp - game.lastTime) / 1000, 0.05);
  game.lastTime = timestamp;

  if (game.running) {
    update(dt);
  }
  draw();

  requestAnimationFrame(gameLoop);
}

// ======================== 事件绑定 ========================
document.addEventListener('keydown', (e) => {
  game.keys[e.key] = true;
  if (e.key === 'p' || e.key === 'P') {
    game.paused = !game.paused;
  }
  if (e.key === ' ' || e.key === 'ArrowUp' || e.key === 'ArrowDown' ||
      e.key === 'ArrowLeft' || e.key === 'ArrowRight') {
    e.preventDefault();
  }
});

document.addEventListener('keyup', (e) => {
  game.keys[e.key] = false;
});

document.getElementById('startBtn').addEventListener('click', () => {
  initLevel(0);
});

document.getElementById('restartBtn').addEventListener('click', () => {
  game.lives = 3; game.score = 0; game.kills = 0;
  initLevel(0);
});

document.getElementById('nextLevelBtn').addEventListener('click', () => {
  initLevel(game.level + 1);
});

// ======================== 启动 ========================
game.lastTime = performance.now();
requestAnimationFrame(gameLoop);
updateUI();
</script>
